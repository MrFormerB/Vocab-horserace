<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏇 VocabRace PRO – Connectivity Fix</title>
    <!-- Stabile Bibliotheken via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');
        :root { --gold: #f5c518; --accent: #ff6b35; --dark: #1a1a2e; --white: #f8f9fa; --correct: #06d6a0; }
        body { font-family: 'Nunito', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .container { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 30px; max-width: 650px; width: 100%; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .game-title { font-family: 'Boogaloo', cursive; font-size: 3rem; color: var(--gold); text-align: center; margin-bottom: 20px; }
        
        .config-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-size: 0.8rem; color: var(--gold); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #242444; color: white; box-sizing: border-box; }
        
        .upload-area { border: 2px dashed var(--gold); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; background: rgba(245,197,24,0.05); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-family: 'Boogaloo', cursive; font-size: 1.6rem; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--gold); color: var(--dark); }
        .btn-primary:disabled { background: #444; color: #888; }

        #qr-container { background: white; padding: 15px; border-radius: 12px; margin: 20px auto; width: fit-content; display: none; border: 5px solid var(--gold); }
        .info-text { font-size: 0.85rem; color: #ff9999; margin-bottom: 15px; text-align: center; line-height: 1.4; }

        /* Track Layout */
        .track { width: 100%; height: 450px; background: #2d7a1f; position: relative; border-radius: 15px; border: 5px solid #1e5215; overflow: hidden; margin-top: 20px; }
        .horse { position: absolute; font-size: 2.5rem; transition: left 0.6s ease-out; display: flex; flex-direction: column; align-items: center; }
        .horse-label { font-size: 0.7rem; background: black; color: white; padding: 2px 5px; border-radius: 3px; margin-bottom: -5px; }
        .finish { position: absolute; right: 60px; top: 0; bottom: 0; width: 25px; background: repeating-linear-gradient(white 0, white 10px, black 10px, black 20px); }
    </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="screen active" id="setup-screen">
    <div class="container">
        <div class="game-title">🏇 VocabRace Setup</div>
        
        <div class="info-text">
            <strong>Wichtiger Hinweis:</strong> Damit der QR-Code funktioniert, muss diese Datei auf einem Server liegen (z.B. fobizz) oder dein Laptop und die Handys im selben WLAN sein.
        </div>

        <div class="config-box">
            <div><label>Runden</label><input type="number" id="inp-rounds" value="10"></div>
            <div><label>Sekunden</label><input type="number" id="inp-timer" value="15"></div>
            <div style="grid-column: span 2;">
                <label>Max. Spieler</label>
                <input type="number" id="inp-max-players" value="30">
            </div>
        </div>

        <div class="upload-area" onclick="document.getElementById('csv-input').click()">
            <div id="status-text">📁 CSV-Vokabeln hochladen</div>
            <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="loadCSV(this)">
        </div>
        
        <button class="btn btn-primary" id="btn-lobby" onclick="createLobby()" disabled>Zuerst CSV wählen</button>
    </div>
</div>

<!-- LOBBY SCREEN -->
<div class="screen" id="lobby-screen">
    <div class="container" style="text-align:center;">
        <div class="game-title">Warteraum</div>
        <p>Scanne den Code mit dem Handy:</p>
        <div id="qr-container"></div>
        <div id="player-status" style="font-size: 1.2rem; color: var(--gold); margin: 15px 0;">Spieler: 0</div>
        <div id="player-tags" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-bottom:20px;"></div>
        <button class="btn btn-primary" id="btn-start" onclick="startRace()" disabled>Warten auf Spieler...</button>
    </div>
</div>

<!-- RACE SCREEN -->
<div class="screen" id="race-screen">
    <div style="text-align:center; width:100%;">
        <h1 id="vocab-question" style="font-size: 3rem; margin: 0; color: var(--gold);">---</h1>
        <div id="timer-display" style="font-size: 1.5rem; color: var(--accent);">Zeit: --</div>
    </div>
    <div class="track" id="race-track">
        <div class="finish"></div>
    </div>
</div>

<script>
let peer, players = {}, vocab = [], currentIdx = 0, gameOn = false;
let totalRounds, roundSecs, limitPlayers, timer;

// 1. CSV LADEN
function loadCSV(input) {
    const reader = new FileReader();
    reader.onload = function(e) {
        vocab = e.target.result.split(/\r?\n/)
            .map(line => line.split(/[;,]/))
            .filter(p => p.length >= 2)
            .map(p => ({ en: p[0].trim(), de: p[1].trim() }));
        
        if(vocab.length > 0) {
            document.getElementById('status-text').innerText = `✅ ${vocab.length} Vokabeln bereit!`;
            document.getElementById('btn-lobby').disabled = false;
            document.getElementById('btn-lobby').innerText = "Lobby erstellen";
        }
    };
    reader.readAsText(input.files[0]);
}

// 2. LOBBY & QR LOGIK
function createLobby() {
    totalRounds = parseInt(document.getElementById('inp-rounds').value);
    roundSecs = parseInt(document.getElementById('inp-timer').value);
    limitPlayers = parseInt(document.getElementById('inp-max-players').value);

    peer = new Peer();
    
    peer.on('open', (id) => {
        // DER FIX: Wir nutzen eine Fallback-Logik für die URL
        let baseUrl = window.location.href.split('#')[0].split('?')[0];
        
        // Wenn lokal geöffnet, warnen wir den Lehrer
        if(baseUrl.startsWith('file:///')) {
            alert("ACHTUNG: Du hast die Datei lokal geöffnet. Der QR-Code wird auf Handys nicht funktionieren. Bitte lade die Datei bei fobizz hoch oder nutze einen lokalen Server!");
        }

        const joinUrl = baseUrl + '?join=' + id;
        
        document.getElementById('qr-container').style.display = 'block';
        document.getElementById('qr-container').innerHTML = ""; // Clear
        new QRCode(document.getElementById("qr-container"), {
            text: joinUrl,
            width: 200,
            height: 200,
            correctLevel: QRCode.CorrectLevel.L
        });
        
        showScreen('lobby-screen');
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.type === 'join') {
                players[conn.peer] = { name: data.name, score: 0, conn: conn };
                updateLobby();
            }
            if(data.type === 'ans') checkAnswer(conn.peer, data.val);
        });
    });
}

function updateLobby() {
    const count = Object.keys(players).length;
    document.getElementById('player-status').innerText = `Spieler: ${count} / ${limitPlayers}`;
    document.getElementById('player-tags').innerHTML = Object.values(players).map(p => `<span style="background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:15px; border:1px solid var(--gold);">${p.name}</span>`).join(' ');
    document.getElementById('btn-start').disabled = count === 0;
    document.getElementById('btn-start').innerText = `Rennen starten (${count})`;
}

// 3. RACE LOGIK
function startRace() {
    gameOn = true;
    Object.values(players).forEach(p => p.conn.send({ type: 'go' }));
    showScreen('race-screen');
    setupTrack();
    runRound();
}

function setupTrack() {
    const track = document.getElementById('race-track');
    const pIds = Object.keys(players);
    const laneH = 400 / pIds.length;

    pIds.forEach((id, i) => {
        const h = document.createElement('div');
        h.className = 'horse';
        h.id = `h-${id}`;
        h.innerHTML = `<span class="horse-label">${players[id].name}</span>🏇`;
        h.style.top = (i * laneH + 15) + "px";
        h.style.left = "5%";
        track.appendChild(h);
    });
}

function runRound() {
    if(currentIdx >= totalRounds || currentIdx >= vocab.length) {
        document.getElementById('vocab-question').innerText = "🏁 FINISH!";
        gameOn = false;
        return;
    }

    const q = vocab[currentIdx].de;
    document.getElementById('vocab-question').innerText = q;
    Object.values(players).forEach(p => p.conn.send({ type: 'q', text: q }));
    
    let sec = roundSecs;
    clearInterval(timer);
    timer = setInterval(() => {
        sec--;
        document.getElementById('timer-display').innerText = `Zeit: ${sec}s`;
        if(sec <= 0) {
            currentIdx++;
            runRound();
        }
    }, 1000);
}

function checkAnswer(id, val) {
    if(!gameOn) return;
    if(val.toLowerCase().trim() === vocab[currentIdx].en.toLowerCase().trim()) {
        players[id].score += (85 / totalRounds);
        document.getElementById(`h-${id}`).style.left = (5 + players[id].score) + "%";
        clearInterval(timer);
        currentIdx++;
        setTimeout(runRound, 1000);
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// 4. CLIENT LOGIK (Wird aktiviert wenn ?join=ID in URL)
const params = new URLSearchParams(window.location.search);
if(params.has('join')) {
    document.body.innerHTML = `
        <div class="screen active" style="background:#1a1a2e; padding:20px;">
            <div id="join-form" class="container">
                <h2 class="game-title">VocabRace Join</h2>
                <input type="text" id="p-name" placeholder="Dein Name...">
                <button class="btn btn-primary" style="margin-top:20px;" onclick="doJoin()">Beitreten</button>
            </div>
            <div id="play-area" style="display:none; width:100%; text-align:center;">
                <h2 id="q-text" style="color:var(--gold);">Warten...</h2>
                <input type="text" id="a-input" placeholder="Antwort...">
                <button class="btn btn-primary" style="margin-top:20px;" onclick="sendAns()">Senden</button>
            </div>
        </div>`;
}

function doJoin() {
    const name = document.getElementById('p-name').value;
    if(!name) return;
    const p = new Peer();
    p.on('open', () => {
        const c = p.connect(params.get('join'));
        c.on('open', () => {
            c.send({ type: 'join', name: name });
            document.getElementById('join-form').innerHTML = "<h1>Verbunden! Blick zum Smartboard.</h1>";
        });
        c.on('data', (d) => {
            if(d.type === 'go') {
                document.getElementById('join-form').style.display = 'none';
                document.getElementById('play-area').style.display = 'block';
            }
            if(d.type === 'q') {
                document.getElementById('q-text').innerText = d.text;
                document.getElementById('a-input').value = "";
                document.getElementById('a-input').focus();
            }
        });
        window.sendAns = () => c.send({ type: 'ans', val: document.getElementById('a-input').value });
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏇 VocabRace PRO – BW Oberstufe Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');
        :root { --gold: #f5c518; --accent: #ff6b35; --dark: #1a1a2e; --white: #f8f9fa; --correct: #06d6a0; --wrong: #ef233c; }
        body { font-family: 'Nunito', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .container { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 30px; max-width: 650px; width: 100%; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-align:center; }
        .game-title { font-family: 'Boogaloo', cursive; font-size: 3.5rem; color: var(--gold); margin-bottom: 20px; }
        
        .config-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-size: 0.8rem; color: var(--gold); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; text-align: left; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #242444; color: white; box-sizing: border-box; font-size: 1rem; }
        
        .upload-area { border: 2px dashed var(--gold); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; background: rgba(245,197,24,0.05); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-family: 'Boogaloo', cursive; font-size: 1.6rem; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--gold); color: var(--dark); }
        .btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }

        #qr-container { background: white; padding: 15px; border-radius: 12px; margin: 20px auto; width: fit-content; border: 5px solid var(--gold); }
        .feedback-badge { position: absolute; font-weight: 900; font-size: 1.5rem; animation: floatUp 1s forwards; z-index: 100; }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-50px); opacity: 0; } }

        /* Track Layout */
        .track { width: 100%; height: 480px; background: #2d7a1f; position: relative; border-radius: 15px; border: 5px solid #1e5215; overflow: hidden; margin-top: 20px; }
        .horse { position: absolute; font-size: 2.8rem; transition: left 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); display: flex; flex-direction: column; align-items: center; z-index: 50; }
        .horse-label { font-size: 0.75rem; background: rgba(0,0,0,0.85); color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: -5px; font-weight: bold; }
        
        /* Grid Lines */
        .marker-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.15); border-left: 1px dashed rgba(255,255,255,0.2); }
        .finish { position: absolute; right: 80px; top: 0; bottom: 0; width: 30px; background: repeating-linear-gradient(white 0, white 10px, black 10px, black 20px); box-shadow: -5px 0 15px rgba(0,0,0,0.3); z-index: 10; }
        
        .solution-reveal { font-size: 1.8rem; color: var(--correct); font-weight: bold; margin-top: 10px; min-height: 2rem; }
    </style>
</head>
<body>

<!-- SETUP SCREEN (TEACHER) -->
<div class="screen active" id="setup-screen">
    <div class="container">
        <div class="game-title">🏇 VocabRace Setup</div>
        <div class="config-box">
            <div><label>Total Rounds</label><input type="number" id="inp-rounds" value="10"></div>
            <div><label>Seconds per Round</label><input type="number" id="inp-timer" value="15"></div>
            <div style="grid-column: span 2;"><label>Max Players</label><input type="number" id="inp-max-players" value="30"></div>
        </div>
        <div class="upload-area" onclick="document.getElementById('csv-input').click()">
            <div id="status-text">📁 Upload CSV Vocabulary</div>
            <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="loadCSV(this)">
        </div>
        <button class="btn btn-primary" id="btn-lobby" onclick="createLobby()" disabled>Upload CSV first</button>
    </div>
</div>

<!-- LOBBY SCREEN (TEACHER) -->
<div class="screen" id="lobby-screen">
    <div class="container">
        <div class="game-title">Waiting Room</div>
        <div id="qr-container"></div>
        <div id="player-status" style="font-size: 1.2rem; color: var(--gold); margin: 15px 0;">Players Joined: 0 / 30</div>
        <div id="player-tags" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:20px;"></div>
        <button class="btn btn-primary" id="btn-start" onclick="startRace()" disabled>Waiting for players...</button>
    </div>
</div>

<!-- RACE SCREEN (TEACHER) -->
<div class="screen" id="race-screen">
    <div style="text-align:center; width:100%;">
        <h1 id="vocab-question" style="font-size: 3.5rem; margin: 0; color: var(--gold);">---</h1>
        <div id="solution-display" class="solution-reveal"></div>
        <div id="timer-display" style="font-size: 1.5rem; color: var(--accent); margin-top:10px;">Time left: --s</div>
    </div>
    <div class="track" id="race-track">
        <!-- Marker Lines will be added by JS -->
        <div class="finish"></div>
    </div>
</div>

<script>
let peer, players = {}, vocab = [], currentIdx = 0, gameOn = false;
let totalRounds, roundSecs, limitPlayers, timer, currentAnswer = "", firstCorrectInRound = false;

function loadCSV(input) {
    const reader = new FileReader();
    reader.onload = function(e) {
        vocab = e.target.result.split(/\r?\n/).map(line => line.split(/[;,]/)).filter(p => p.length >= 2).map(p => ({ en: p[0].trim(), de: p[1].trim() }));
        if(vocab.length > 0) {
            document.getElementById('status-text').innerText = `✅ ${vocab.length} Words Loaded!`;
            document.getElementById('btn-lobby').disabled = false;
            document.getElementById('btn-lobby').innerText = "Create Lobby";
        }
    };
    reader.readAsText(input.files[0]);
}

function createLobby() {
    totalRounds = parseInt(document.getElementById('inp-rounds').value);
    roundSecs = parseInt(document.getElementById('inp-timer').value);
    limitPlayers = parseInt(document.getElementById('inp-max-players').value);
    peer = new Peer();
    peer.on('open', (id) => {
        const joinUrl = window.location.href.split('?')[0] + '?join=' + id;
        new QRCode(document.getElementById("qr-container"), { text: joinUrl, width: 200, height: 200 });
        showScreen('lobby-screen');
    });
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.type === 'join') { players[conn.peer] = { name: data.name, score: 0, conn: conn }; updateLobby(); }
            if(data.type === 'ans') checkAnswer(conn.peer, data.val);
        });
    });
}

function updateLobby() {
    const count = Object.keys(players).length;
    document.getElementById('player-status').innerText = `Players: ${count} / ${limitPlayers}`;
    document.getElementById('player-tags').innerHTML = Object.values(players).map(p => `<span style="background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:15px; border:2px solid var(--gold);">${p.name}</span>`).join(' ');
    document.getElementById('btn-start').disabled = count === 0;
    document.getElementById('btn-start').innerText = `Start Race (${count})`;
}

function startRace() {
    gameOn = true;
    Object.values(players).forEach(p => p.conn.send({ type: 'go' }));
    showScreen('race-screen');
    setupTrack();
    runRound();
}

function setupTrack() {
    const track = document.getElementById('race-track');
    // Add Vertical Marker Lines (10 sections)
    for(let i = 1; i < 10; i++) {
        const line = document.createElement('div');
        line.className = 'marker-line';
        line.style.left = (i * 10) + "%";
        track.appendChild(line);
    }

    const pIds = Object.keys(players);
    const laneH = 420 / pIds.length;
    pIds.forEach((id, i) => {
        const h = document.createElement('div'); h.className = 'horse'; h.id = `h-${id}`;
        h.innerHTML = `<span class="horse-label">${players[id].name}</span>🏇`;
        h.style.top = (i * laneH + 20) + "px"; h.style.left = "5%";
        track.appendChild(h);
    });
}

function runRound() {
    if(currentIdx >= totalRounds || currentIdx >= vocab.length) { 
        document.getElementById('vocab-question').innerText = "🏁 FINISH!"; 
        document.getElementById('solution-display').innerText = "";
        gameOn = false; return; 
    }

    document.getElementById('solution-display').innerText = "";
    firstCorrectInRound = false;

    // Randomize Direction
    let isEnToDe = Math.random() < 0.5;
    let questionWord = isEnToDe ? vocab[currentIdx].en : vocab[currentIdx].de;
    currentAnswer = isEnToDe ? vocab[currentIdx].de : vocab[currentIdx].en;

    document.getElementById('vocab-question').innerText = "Translate: " + questionWord;
    Object.values(players).forEach(p => p.conn.send({ type: 'q', text: "Translate: " + questionWord }));
    
    let sec = roundSecs;
    clearInterval(timer);
    timer = setInterval(() => {
        sec--; document.getElementById('timer-display').innerText = `Time left: ${sec}s`;
        if(sec <= 0) { 
            // All players who didn't answer lose a point
            Object.keys(players).forEach(id => showPoints(id, -1));
            endRound(); 
        }
    }, 1000);
}

function checkAnswer(id, val) {
    if(!gameOn) return;
    if(val.toLowerCase().trim() === currentAnswer.toLowerCase().trim()) {
        let points = firstCorrectInRound ? 1 : 2; // +2 for the very first correct one, +1 for others
        firstCorrectInRound = true;
        
        players[id].score += (points * (85 / (totalRounds * 1.5))); // Visual progress adjustment
        document.getElementById(`h-${id}`).style.left = Math.min(90, (5 + players[id].score)) + "%";
        
        showPoints(id, `+${points}`);
        endRound();
    } else {
        showPoints(id, -1);
    }
}

function showPoints(id, val) {
    const horse = document.getElementById(`h-${id}`);
    const badge = document.createElement('div');
    badge.className = 'feedback-badge';
    badge.innerText = val;
    badge.style.color = val.toString().startsWith('+') ? 'var(--correct)' : 'var(--wrong)';
    horse.appendChild(badge);
    setTimeout(() => badge.remove(), 1000);
}

function endRound() {
    clearInterval(timer);
    document.getElementById('solution-display').innerText = "Correct Answer: " + currentAnswer;
    currentIdx++;
    setTimeout(runRound, 2500); // 2.5s pause to see the solution
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// CLIENT LOGIK
const params = new URLSearchParams(window.location.search);
if(params.has('join')) {
    document.body.innerHTML = `
        <div class="screen active" style="background:#1a1a2e; padding:20px;">
            <div id="join-form" class="container">
                <h2 class="game-title">Join Race</h2>
                <input type="text" id="p-name" placeholder="Enter your name...">
                <button class="btn btn-primary" style="margin-top:20px;" onclick="doJoin()">Join Now!</button>
                <p id="conn-status" style="margin-top:10px; font-size:0.8rem; color:var(--gold);"></p>
            </div>
            <div id="play-area" style="display:none; width:100%; text-align:center;">
                <h2 id="q-text" style="color:var(--gold);">Waiting...</h2>
                <input type="text" id="a-input" placeholder="Your Answer...">
                <button class="btn btn-primary" style="margin-top:20px;" onclick="sendAns()">Submit</button>
            </div>
        </div>`;
}

function doJoin() {
    const name = document.getElementById('p-name').value;
    const status = document.getElementById('conn-status');
    if(!name) return;
    status.innerText = "Connecting to classroom board...";
    const p = new Peer();
    p.on('open', () => {
        const c = p.connect(params.get('join'));
        c.on('open', () => {
            c.send({ type: 'join', name: name });
            document.getElementById('join-form').innerHTML = "<h1>Connected! Look at the Smartboard.</h1>";
        });
        c.on('data', (d) => {
            if(d.type === 'go') { document.getElementById('join-form').style.display = 'none'; document.getElementById('play-area').style.display = 'block'; }
            if(d.type === 'q') { document.getElementById('q-text').innerText = d.text; document.getElementById('a-input').value = ""; document.getElementById('a-input').focus(); }
        });
        window.sendAns = () => c.send({ type: 'ans', val: document.getElementById('a-input').value });
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏇 VocabRace ULTIMATE – School-Proof Edition</title>
    <!-- Modern Libraries: MQTT for Relay, QRCode, Excel, Word -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700&display=swap');
        :root { --neon-teal: #01ffff; --neon-purple: #bc13fe; --dark-bg: #0a0b1e; --correct: #00ff88; --wrong: #ff3e3e; --gold: #f5c518; --glass: rgba(255, 255, 255, 0.07); }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); background-image: radial-gradient(circle at 50% 50%, #161a3d 0%, #0a0b1e 100%); color: white; margin: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 40px; max-width: 750px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.6); text-align: center; }
        .game-title { font-family: 'Outfit', sans-serif; font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, var(--neon-teal), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        label { font-size: 0.75rem; color: var(--neon-teal); font-weight: 700; display: block; margin-bottom: 5px; text-align: left; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; }
        .client-input { color: #000 !important; background: #fff !important; font-weight: 700; border: 3px solid var(--neon-teal); text-align: center; font-size: 1.2rem; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, var(--neon-purple), var(--neon-teal)); color: white; }
        .track { width: 100%; height: 480px; background: #121431; position: relative; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; margin-top: 30px; }
        .horse { position: absolute; font-size: 3rem; transition: left 1s ease-out; display: flex; flex-direction: column; align-items: center; z-index: 100; transform: scaleX(-1); }
        .horse-label { transform: scaleX(-1); font-size: 0.7rem; background: #000; color: var(--neon-teal); padding: 2px 8px; border-radius: 4px; font-weight: 900; margin-bottom: -5px; white-space: nowrap; }
        .goal-area { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%) 50% / 20px 20px; display: flex; align-items: center; justify-content: center; border-left: 4px solid var(--gold); }
        .goal-text { background: var(--gold); color: #000; font-family: 'Outfit', sans-serif; font-weight: 900; padding: 5px 15px; border-radius: 4px; transform: rotate(-90deg); }
        .solution-reveal { font-size: 2.5rem; color: var(--correct); font-weight: 900; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; border: 2px solid var(--correct); display: none; }
        #start-cd { font-size: 12rem; font-family: 'Outfit', sans-serif; font-weight: 900; color: var(--neon-teal); position: absolute; z-index: 1000; text-shadow: 0 0 50px var(--neon-teal); }
        .marker-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(1, 255, 255, 0.1); border-left: 1px dashed rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

<!-- TEACHER: SETUP -->
<div class="screen active" id="setup-screen">
    <div class="glass-panel">
        <div class="game-title">VocabRace Setup</div>
        <div class="config-grid">
            <div><label>Score to Win</label><input type="number" id="cfg-rounds" value="10"></div>
            <div><label>Max Players</label><input type="number" id="cfg-players" value="30"></div>
            <div><label>Question Time (s)</label><input type="number" id="cfg-q-timer" value="15"></div>
            <div><label>Reveal Time (s)</label><input type="number" id="cfg-s-timer" value="5"></div>
        </div>
        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">📁 Select Vocabulary (CSV/XLSX/DOCX)</button>
        <input type="file" id="file-input" style="display:none" onchange="processFile(this)">
        <p id="file-status" style="margin: 15px 0; color: var(--neon-teal);">No file uploaded</p>
        <button class="btn btn-primary" id="btn-lobby" onclick="openLobby()" disabled>Open Lobby</button>
    </div>
</div>

<!-- TEACHER: LOBBY -->
<div class="screen" id="lobby-screen">
    <div class="glass-panel">
        <div class="game-title">Waiting Room</div>
        <div id="qr-container" style="display:flex; justify-content:center;"></div>
        <p id="p-count" style="font-size: 1.2rem; color: var(--neon-teal); margin: 20px 0;">Joined: 0</p>
        <div id="p-list" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:30px;"></div>
        <button class="btn btn-primary" id="btn-start" onclick="startSequence()" disabled>Start Race</button>
    </div>
</div>

<!-- TEACHER: RACE -->
<div class="screen" id="race-screen">
    <div id="start-cd" style="display:none">10</div>
    <div style="text-align:center; z-index:500;">
        <h1 id="vocab-question">Ready?</h1>
        <div id="sol-box" class="solution-reveal"></div>
        <div id="timer-bar" style="font-size: 1.5rem; color: var(--accent); margin-top:15px; font-weight: 900;">TIME: --S</div>
    </div>
    <div class="track" id="race-track"><div class="goal-area"><div class="goal-text">GOAL</div></div></div>
</div>

<script>
// MQTT Relay Configuration (Public Broker)
const BROKER = 'wss://broker.hivemq.com:8000/mqtt';
const ROOM_ID = 'vocab_race_' + Math.random().toString(36).substr(2, 9);
let client, players = {}, vocab = [], currentIdx = 0, gameActive = false;
let cfgRounds, cfgQTime, cfgSTime, timer, currentAnswer = "", firstCorrectInRound = false;

// 1. FILE PROCESSING
async function processFile(input) {
    const file = input.files[0]; if(!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();
    if(ext === 'csv') { reader.onload = (e) => parseVocab(e.target.result); reader.readAsText(file); }
    else if(ext === 'xlsx') { reader.onload = (e) => { const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'}); parseVocab(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}).map(r => r.join(',')).join('\n')); }; reader.readAsArrayBuffer(file); }
    else if(ext === 'docx') { reader.onload = (e) => mammoth.extractRawText({arrayBuffer: e.target.result}).then(res => parseVocab(res.value)); reader.readAsArrayBuffer(file); }
}

function parseVocab(text) {
    vocab = text.split(/\r?\n/).map(l => l.split(/[;,]/)).filter(p => p.length >= 2).map(p => ({ en: p[0].trim(), de: p[1].trim(), err: 0 })).sort(() => Math.random() - 0.5);
    document.getElementById('file-status').innerText = `✅ ${vocab.length} Words Loaded`;
    document.getElementById('btn-lobby').disabled = vocab.length === 0;
}

// 2. CONNECTIVITY (MQTT RELAY)[cite: 2]
function openLobby() {
    cfgRounds = parseInt(document.getElementById('cfg-rounds').value);
    cfgQTime = parseInt(document.getElementById('cfg-q-timer').value);
    cfgSTime = parseInt(document.getElementById('cfg-s-timer').value);
    
    client = mqtt.connect(BROKER);
    client.on('connect', () => {
        client.subscribe(ROOM_ID + '/client');
        const url = window.location.origin + window.location.pathname + '?room=' + ROOM_ID;
        document.getElementById('qr-container').innerHTML = "";
        new QRCode(document.getElementById("qr-container"), { text: url, width: 200, height: 200 });
        showScreen('lobby-screen');
    });

    client.on('message', (topic, message) => {
        const d = JSON.parse(message.toString());
        if(d.type === 'join') { 
            players[d.id] = { name: d.name, score: 0, lastResult: 0 }; 
            updateLobby(); 
        }
        if(d.type === 'ans') handleAnswer(d.id, d.val);
    });
}

function updateLobby() {
    const c = Object.keys(players).length;
    document.getElementById('p-count').innerText = `Joined: ${c}`;
    document.getElementById('p-list').innerHTML = Object.values(players).map(p => `<span style="background:rgba(255,255,255,0.1); padding:8px 15px; border-radius:20px; border:1px solid var(--neon-teal);">${p.name}</span>`).join('');
    document.getElementById('btn-start').disabled = c === 0;
}

function startSequence() {
    showScreen('race-screen');
    let cd = 10; const el = document.getElementById('start-cd'); el.style.display = "block";
    const intv = setInterval(() => { el.innerText = cd; cd--; if(cd < 0) { clearInterval(intv); el.style.display = "none"; startRace(); } }, 1000);
}

function startRace() {
    gameActive = true;
    client.publish(ROOM_ID + '/host', JSON.stringify({ type: 'start' }));
    Object.keys(players).forEach((id, i) => {
        const h = document.createElement('div'); h.className = 'horse'; h.id = `h-${id}`;
        h.innerHTML = `<span class="horse-label">${players[id].name}</span>🏇`;
        h.style.top = (i * (400/Object.keys(players).length) + 40) + "px"; h.style.left = "5%";
        document.getElementById('race-track').appendChild(h);
    });
    runRound();
}

function runRound() {
    if(currentIdx >= vocab.length) { vocab = vocab.sort((a,b) => b.err - a.err); currentIdx = 0; }
    document.getElementById('sol-box').style.display = "none";
    firstCorrectInRound = false;
    let isEn = Math.random() < 0.5;
    currentAnswer = isEn ? vocab[currentIdx].de : vocab[currentIdx].en;
    let qText = "Translate: " + (isEn ? vocab[currentIdx].en : vocab[currentIdx].de);
    document.getElementById('vocab-question').innerText = qText;
    client.publish(ROOM_ID + '/host', JSON.stringify({ type: 'q', text: qText }));
    let s = cfgQTime; clearInterval(timer);
    timer = setInterval(() => { document.getElementById('timer-bar').innerText = `TIME: ${s}S`; s--; if(s < 0) { vocab[currentIdx].err++; reveal(); } }, 1000);
}

function handleAnswer(id, val) {
    if(!gameActive || document.getElementById('sol-box').style.display === "block") return;
    if(val.toLowerCase().trim() === currentAnswer.toLowerCase().trim()) {
        let pts = firstCorrectInRound ? 1 : 2;
        firstCorrectInRound = true;
        players[id].score += pts; players[id].lastResult = pts;
        if(players[id].score >= cfgRounds) gameActive = false;
        const pct = Math.min(88, 5 + (players[id].score * (80/cfgRounds)));
        document.getElementById(`h-${id}`).style.left = pct + "%";
        client.publish(ROOM_ID + '/host', JSON.stringify({ type: 'wait', targetId: id, res: pts, sol: currentAnswer }));
    } else { players[id].lastResult = -1; }
}

function reveal() {
    clearInterval(timer);
    document.getElementById('sol-box').innerText = "SOLUTION: " + currentAnswer; document.getElementById('sol-box').style.display = "block";
    Object.keys(players).forEach(id => { 
        client.publish(ROOM_ID + '/host', JSON.stringify({ type: 'reveal', targetId: id, res: players[id].lastResult, sol: currentAnswer })); 
    });
    currentIdx++;
    if(gameActive) setTimeout(runRound, cfgSTime * 1000);
    else document.getElementById('vocab-question').innerText = "🏁 RACE FINISHED!";
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// 3. CLIENT LOGIC
const params = new URLSearchParams(window.location.search);
if(params.has('room')) {
    const room = params.get('room');
    const myId = 'p_' + Math.random().toString(36).substr(2, 5);
    let clientPeer = mqtt.connect(BROKER);
    
    document.body.innerHTML = `
        <div class="screen active" id="c-tut"><div class="glass-panel"><h2 class="game-title" style="font-size:2rem;">Protocol</h2><p>⚡ Fastest Correct: +2 pts | ✅ Correct: +1 pt | ❌ Wrong: -1 pt</p><button class="btn btn-primary" onclick="showScreen('c-join')">Engage</button></div></div>
        <div class="screen" id="c-join"><div class="glass-panel"><h2 class="game-title" style="font-size:2rem;">Identity</h2><input type="text" id="p-name" class="client-input" placeholder="Enter Nickname"><button class="btn btn-primary" style="margin-top:20px;" onclick="doJoin()">Connect</button></div></div>
        <div class="screen" id="c-play"><div class="glass-panel"><h2 id="q-text" style="color:var(--neon-teal);">Linking...</h2><input type="text" id="a-input" class="client-input" placeholder="Type translation..."><button class="btn btn-primary" style="margin-top:20px;" id="btn-send" onclick="sendAns()">Transmit</button><div id="fb-box" style="display:none; margin-top:20px;"><div id="fb-val" style="font-size:4rem; font-weight:900;"></div><p id="fb-sol"></p></div></div></div>`;

    clientPeer.on('connect', () => {
        clientPeer.subscribe(room + '/host');
    });

    clientPeer.on('message', (topic, message) => {
        const d = JSON.parse(message.toString());
        if(d.type === 'start') showScreen('c-play');
        if(d.type === 'q') {
            document.getElementById('q-text').innerText = d.text;
            const inp = document.getElementById('a-input'); inp.disabled = false; inp.style.background = "#fff";
            inp.value = ""; document.getElementById('btn-send').style.display = "block"; document.getElementById('fb-box').style.display = "none";
        }
        if(d.type === 'wait' && d.targetId === myId) {
            const inp = document.getElementById('a-input'); inp.disabled = true; inp.style.background = "#ccc";
            document.getElementById('btn-send').style.display = "none"; document.getElementById('fb-box').style.display = "block"; document.getElementById('fb-val').innerText = "...";
        }
        if(d.type === 'reveal' && d.targetId === myId) {
            document.getElementById('fb-box').style.display = "block";
            const val = document.getElementById('fb-val'); val.innerText = (d.res > 0 ? "+" + d.res : d.res);
            val.style.color = d.res > 0 ? "var(--correct)" : "var(--wrong)";
            document.getElementById('fb-sol').innerText = "Solution: " + d.sol;
        }
    });

    window.doJoin = () => {
        const name = document.getElementById('p-name').value;
        if(!name) return;
        clientPeer.publish(room + '/client', JSON.stringify({ type: 'join', id: myId, name: name }));
        document.getElementById('c-join').innerHTML = "<h1>SYNCED</h1><p>Watch board!</p>";
    };
    window.sendAns = () => clientPeer.publish(room + '/client', JSON.stringify({ type: 'ans', id: myId, val: document.getElementById('a-input').value }));
}
</script>
</body>
</html>
